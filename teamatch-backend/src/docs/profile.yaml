tags:
  - name: Profile
    description: User profile management

paths:
  /profile:
    get:
      summary: Get the authenticated user's profile
      tags: [Profile]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Returns the user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  userId:
                    type: integer
                    example: 1
                  displayName:
                    type: string
                    example: Ben
                  bio:
                    type: string
                    example: Looking for teammates in Valorant
                  region:
                    type: string
                    example: EU
                  competitiveLevel:
                    type: string
                    example: Competitive
                  micPreference:
                    type: string
                    example: Always
        '401':
          description: Unauthorized

    patch:
      summary: Update the authenticated user's profile
      tags: [Profile]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  example: Ben
                bio:
                  type: string
                  example: Looking for teammates
                region:
                  type: string
                  example: EU
                competitiveLevel:
                  type: string
                  example: Competitive
                micPreference:
                  type: string
                  example: Always
      responses:
        '200':
          description: Profile updated successfully
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized