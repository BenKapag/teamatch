tags:
  - name: Users
    description: User identity endpoints

paths:
  /users/me:
    get:
      summary: Get the currently authenticated user
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Returns the authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      email:
                        type: string
                        example: ben@gmail.com
                      username:
                        type: string
                        example: ben96
                      createdAt:
                        type: string
                        example: "2024-01-01T00:00:00.000Z"
        '401':
          description: Unauthorized

  /users/{id}:
    get:
      summary: Get a user by ID
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Returns the user
        '404':
          description: User not found
        '400':
          description: Invalid user ID