services:
  postgres:
    image: postgres:16
    container_name: teamatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: teamatch_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - teamatch_postgres_data:/var/lib/postgresql/data

volumes:
  teamatch_postgres_data: